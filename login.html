<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="login.css" rel="stylesheet">
</head>
<body>

    <div class="container">
    <div class="login-cntr">

        <div id="logo-div">
        <txt id="log-in">
            Log-in into your Account
        </txt>
        
        <img id="wrong" src="wrong.png" alt="wrong" width="26px" height="26px" usemap="#wrong">

        <map name="wrong">
            <area shape="default" coords="0,0,640,640" href="#" target="_self">
        </map>
        </div>

        <hr width="300px" style="margin-top: 10px; margin-bottom: 20px;">

    <form>
        <label id="fl">Username:</label>
        <input type="text" placeholder="USERNAME" required title="Username" id="username"><br><br>

        
        <label id="fl">
            Password:
        </label>
        <input type="password" placeholder="PASSWORD" required title="Password" id="password"><br><br>

        <div id="button-cntr">
        <input type="submit" value="Log in" id="btn">
        <input type="reset" value="clear" id="btn">   
        </div> 

    </form>
    </div>
    </div>
   
</body>
</html>
